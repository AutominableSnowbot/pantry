<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#92400e" />
  <title>Spiskammer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    * { -webkit-tap-highlight-color: transparent; }
    @keyframes pulse-red {
      0%, 100% { background-color: #dc2626; }
      50% { background-color: #ef4444; }
    }
    .pulse-red { animation: pulse-red 1s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CATEGORIES = [
      "Canned & Boxed",
      "Grains & Legumes",
      "Spices & Seasonings",
      "Sauces & Wet",
      "Fresh / Other"
    ];

    const categoryIcons = {
      "Canned & Boxed": "🥫",
      "Grains & Legumes": "🌾",
      "Spices & Seasonings": "🌶️",
      "Sauces & Wet": "🧂",
      "Fresh / Other": "🥬"
    };

    const categoryColors = {
      "Canned & Boxed": "bg-amber-50 text-amber-900 border border-amber-200",
      "Grains & Legumes": "bg-yellow-50 text-yellow-900 border border-yellow-200",
      "Spices & Seasonings": "bg-orange-50 text-orange-900 border border-orange-200",
      "Sauces & Wet": "bg-sky-50 text-sky-900 border border-sky-200",
      "Fresh / Other": "bg-green-50 text-green-900 border border-green-200"
    };

    const AI_PROMPT = "You are an ingredient extraction assistant. Analyse the provided input (photo, screenshot, or text) and return a JSON array of food items suitable for a pantry tracker.\n\nRULES:\n- Output ONLY a valid JSON array. No markdown code fences, no commentary, no preamble, no trailing text.\n- Each item must have these exact fields: name, qty, unit, category.\n- Use double quotes, not single quotes.\n\nFIELD DEFINITIONS:\n- name: Short, clear English name (e.g. \"Red Kidney Beans\", not \"A can of red kidney beans\")\n- qty: Integer. Best guess from visual count or context. Default to 1.\n- unit: Short human description like \"390g box\", \"bunch\", \"whole\", \"100g bag\", \"sachet\". Empty string if unclear.\n- category: MUST be exactly one of:\n  - \"Canned & Boxed\" - tinned goods, cartons, boxed shelf-stable items\n  - \"Grains & Legumes\" - rice, pasta, lentils, beans (dried), flour, breadcrumbs, nuts\n  - \"Spices & Seasonings\" - spices, dried herbs, stock powder, seasoning sachets\n  - \"Sauces & Wet\" - oils, vinegars, soy sauce, mayo, yoghurt, tomato paste, honey\n  - \"Fresh / Other\" - fresh produce, meat, fish, fresh herbs, dairy, eggs, bread, anything else\n\nBEHAVIOUR:\n- Merge duplicates: three of the same item = one entry with qty: 3\n- If ambiguous, make your best guess and include it\n- If no recognisable food, return []\n\nEXAMPLE OUTPUT:\n[{\"name\":\"Chopped Tomatoes\",\"qty\":1,\"unit\":\"390g box\",\"category\":\"Canned & Boxed\"},{\"name\":\"Garlic\",\"qty\":2,\"unit\":\"bulbs\",\"category\":\"Fresh / Other\"}]";

    const WORD_NUMBERS = {
      "one": 1, "two": 2, "three": 3, "four": 4, "five": 5,
      "six": 6, "seven": 7, "eight": 8, "nine": 9, "ten": 10,
      "a": 1, "an": 1
    };

    function loadJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) { return fallback; }
    }

    function saveJSON(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
    }

    function nextId(list) {
      const ids = list.map(function(i) { return i.id; });
      return ids.length ? Math.max.apply(null, ids) + 1 : 1;
    }

    function recordHistory(history, name, category, unit) {
      const key = name.toLowerCase().trim();
      const existing = history.find(function(h) { return h.key === key; });
      const now = new Date().toISOString();
      if (existing) {
        existing.addCount = existing.addCount + 1;
        existing.lastAdded = now;
        if (category) existing.lastCategory = category;
        if (unit) existing.lastUnit = unit;
      } else {
        history.push({
          key: key,
          name: name,
          addCount: 1,
          lastAdded: now,
          lastCategory: category || "Fresh / Other",
          lastUnit: unit || ""
        });
      }
      return history.slice();
    }

    function parseVoiceFragment(text) {
      // Returns {name, qty}
      const trimmed = text.trim();
      if (!trimmed) return null;
      const parts = trimmed.split(/\s+/);
      if (parts.length < 2) return { name: trimmed, qty: 1 };
      const first = parts[0].toLowerCase();
      // Try numeric digit
      const num = parseInt(first, 10);
      if (!isNaN(num) && num > 0) {
        return { name: parts.slice(1).join(" "), qty: num };
      }
      // Try word number
      if (WORD_NUMBERS[first] !== undefined) {
        return { name: parts.slice(1).join(" "), qty: WORD_NUMBERS[first] };
      }
      return { name: trimmed, qty: 1 };
    }

    function migrate() {
      // One-time migration from v3 keys to v4 keys
      const migrated = localStorage.getItem("spiskammer-migrated");
      if (migrated) return;

      const oldItems = loadJSON("pantry-items", null);
      const oldShopping = loadJSON("pantry-shopping", null);
      const oldHistory = loadJSON("pantry-history", null);

      if (oldItems) {
        saveJSON("spiskammer-items", oldItems);
      }
      if (oldHistory) {
        saveJSON("spiskammer-history", oldHistory);
      }
      if (oldShopping) {
        // Migrate old single shopping list into the Main list
        saveJSON("spiskammer-lists", [{
          id: "main",
          name: "Main",
          items: oldShopping,
          deletable: false,
          isMain: true
        }]);
        saveJSON("spiskammer-active-list", "main");
      }
      localStorage.setItem("spiskammer-migrated", "true");
    }

    migrate();

    function App() {
      const [tab, setTab] = useState(function() {
        return loadJSON("spiskammer-last-view", "pantry");
      });
      const [items, setItems] = useState(function() {
        return loadJSON("spiskammer-items", []);
      });
      const [lists, setLists] = useState(function() {
        const stored = loadJSON("spiskammer-lists", null);
        if (stored && stored.length > 0) return stored;
        return [{
          id: "main",
          name: "Main",
          items: [],
          deletable: false,
          isMain: true
        }];
      });
      const [activeListId, setActiveListId] = useState(function() {
        return loadJSON("spiskammer-active-list", "main");
      });
      const [history, setHistory] = useState(function() {
        return loadJSON("spiskammer-history", []);
      });
      const [alwaysBuy, setAlwaysBuy] = useState(function() {
        return loadJSON("spiskammer-always-buy", []);
      });
      const [gridExpanded, setGridExpanded] = useState(function() {
        return loadJSON("spiskammer-grid-expanded", false);
      });

      useEffect(function() { saveJSON("spiskammer-items", items); }, [items]);
      useEffect(function() { saveJSON("spiskammer-lists", lists); }, [lists]);
      useEffect(function() { saveJSON("spiskammer-active-list", activeListId); }, [activeListId]);
      useEffect(function() { saveJSON("spiskammer-history", history); }, [history]);
      useEffect(function() { saveJSON("spiskammer-always-buy", alwaysBuy); }, [alwaysBuy]);
      useEffect(function() { saveJSON("spiskammer-grid-expanded", gridExpanded); }, [gridExpanded]);
      useEffect(function() { saveJSON("spiskammer-last-view", tab); }, [tab]);

      // Find active list
      const activeList = lists.find(function(l) { return l.id === activeListId; }) || lists[0];

      function updateActiveList(updater) {
        setLists(lists.map(function(l) {
          if (l.id !== activeListId) return l;
          const updatedItems = updater(l.items);
          return Object.assign({}, l, { items: updatedItems });
        }));
      }

      function updateMainList(updater) {
        setLists(lists.map(function(l) {
          if (!l.isMain) return l;
          const updatedItems = updater(l.items);
          return Object.assign({}, l, { items: updatedItems });
        }));
      }

      // Total count of main list items for the header stat
      const mainList = lists.find(function(l) { return l.isMain; });
      const mainListCount = mainList ? mainList.items.length : 0;

      return (
        <div className="min-h-screen bg-gradient-to-b from-stone-50 via-amber-50 to-stone-100">
          <div className="max-w-2xl mx-auto p-4 pb-24">
            <Header tab={tab} setTab={setTab} mainListCount={mainListCount} />
            {tab === "pantry" ? (
              <PantryView
                items={items}
                setItems={setItems}
                mainList={mainList}
                updateMainList={updateMainList}
                history={history}
                setHistory={setHistory}
              />
            ) : (
              <ShoppingView
                items={items}
                setItems={setItems}
                lists={lists}
                setLists={setLists}
                activeListId={activeListId}
                setActiveListId={setActiveListId}
                activeList={activeList}
                updateActiveList={updateActiveList}
                history={history}
                setHistory={setHistory}
                alwaysBuy={alwaysBuy}
                setAlwaysBuy={setAlwaysBuy}
                gridExpanded={gridExpanded}
                setGridExpanded={setGridExpanded}
              />
            )}
          </div>
        </div>
      );
    }

    function Header(props) {
      const tab = props.tab;
      const setTab = props.setTab;
      const mainListCount = props.mainListCount;
      return (
        <div className="bg-white rounded-2xl shadow-lg p-5 mb-4 border border-amber-200">
          <div className="flex items-center gap-3 mb-3">
            <div className="bg-amber-700 p-2 rounded-xl text-2xl">🌿</div>
            <div>
              <h1 className="text-2xl font-bold text-stone-900">Spiskammer</h1>
              <p className="text-sm text-stone-500">Stock & lists</p>
            </div>
          </div>
          <div className="flex gap-3 text-sm mb-3">
            <div className="bg-amber-100 px-3 py-1.5 rounded-lg text-amber-900 font-medium">
              {mainListCount} on list
            </div>
          </div>
          <div className="flex gap-2">
            <button
              onClick={function() { setTab("pantry"); }}
              className={tab === "pantry"
                ? "flex-1 px-3 py-2 rounded-lg bg-amber-700 text-white font-medium text-sm"
                : "flex-1 px-3 py-2 rounded-lg bg-white text-gray-700 border border-gray-200 font-medium text-sm"}
            >
              📦 Pantry
            </button>
            <button
              onClick={function() { setTab("shopping"); }}
              className={tab === "shopping"
                ? "flex-1 px-3 py-2 rounded-lg bg-amber-700 text-white font-medium text-sm"
                : "flex-1 px-3 py-2 rounded-lg bg-white text-gray-700 border border-gray-200 font-medium text-sm"}
            >
              🛒 Shopping
            </button>
          </div>
        </div>
      );
    }

    function AIHelper() {
      const [copied, setCopied] = useState(false);
      const [open, setOpen] = useState(false);

      function copyPrompt() {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(AI_PROMPT).then(function() {
            setCopied(true);
            setTimeout(function() { setCopied(false); }, 3000);
          }).catch(function() {
            setCopied(false);
          });
        }
      }

      return (
        <div className="bg-stone-100 rounded-2xl border border-stone-300 mb-4 overflow-hidden">
          <button
            onClick={function() { setOpen(!open); }}
            className="w-full p-3 flex items-center justify-between text-left"
          >
            <div className="flex items-center gap-2">
              <span className="text-xl">🤖</span>
              <span className="font-medium text-stone-800">AI Helper</span>
            </div>
            <span className="text-stone-600">{open ? "▲" : "▼"}</span>
          </button>
          {open && (
            <div className="px-3 pb-3 space-y-2">
              <button
                onClick={copyPrompt}
                className="w-full px-3 py-2 rounded-lg bg-stone-700 text-white font-medium text-sm"
              >
                📋 {copied ? "Copied!" : "Copy AI prompt"}
              </button>
              <div className="text-xs text-stone-800 leading-relaxed">
                <p className="font-medium mb-1">How to use:</p>
                <ol className="list-decimal list-inside space-y-0.5 ml-1">
                  <li>Tap the button above to copy the prompt</li>
                  <li>Open ChatGPT/Gemini/Claude with your photo or text</li>
                  <li>Paste the prompt and your input together</li>
                  <li>Save the AI's reply as a .json file</li>
                  <li>Come back and tap Import</li>
                </ol>
              </div>
            </div>
          )}
        </div>
      );
    }

    function PantryView(props) {
      const items = props.items;
      const setItems = props.setItems;
      const mainList = props.mainList;
      const updateMainList = props.updateMainList;
      const history = props.history;
      const setHistory = props.setHistory;

      const [search, setSearch] = useState("");
      const [hideEmpty, setHideEmpty] = useState(false);
      const [showAdd, setShowAdd] = useState(false);
      const [newItem, setNewItem] = useState({ name: "", qty: 1, unit: "", category: "Fresh / Other" });
      const [importMessage, setImportMessage] = useState("");

      function adjustQty(id, delta) {
        setItems(items.map(function(i) {
          return i.id === id ? Object.assign({}, i, { qty: Math.max(0, i.qty + delta) }) : i;
        }));
      }

      function removeItem(id) {
        setItems(items.filter(function(i) { return i.id !== id; }));
      }

      function toggleStaple(id) {
        const item = items.find(function(i) { return i.id === id; });
        if (!item) return;
        const becomingStaple = !item.staple;
        setItems(items.map(function(i) {
          if (i.id !== id) return i;
          return Object.assign({}, i, {
            staple: becomingStaple,
            outOfStock: becomingStaple ? false : i.outOfStock
          });
        }));
        if (!becomingStaple && item.outOfStock) {
          // Remove staple-originated entry from main list
          updateMainList(function(listItems) {
            return listItems.filter(function(s) {
              return !(s.fromStaple && s.name.toLowerCase().trim() === item.name.toLowerCase().trim());
            });
          });
        }
      }

      function toggleStapleStock(id) {
        const item = items.find(function(i) { return i.id === id; });
        if (!item) return;
        const nowOut = !item.outOfStock;
        setItems(items.map(function(i) {
          return i.id === id ? Object.assign({}, i, { outOfStock: nowOut }) : i;
        }));
        const nameKey = item.name.toLowerCase().trim();
        if (nowOut) {
          updateMainList(function(listItems) {
            const already = listItems.find(function(s) {
              return s.name.toLowerCase().trim() === nameKey;
            });
            if (already) return listItems;
            return listItems.concat([{
              id: nextId(listItems),
              name: item.name,
              qty: 1,
              fromStaple: true
            }]);
          });
        } else {
          updateMainList(function(listItems) {
            return listItems.filter(function(s) {
              return !(s.fromStaple && s.name.toLowerCase().trim() === nameKey);
            });
          });
        }
      }

      function addToMainList(item) {
        const nameKey = item.name.toLowerCase().trim();
        updateMainList(function(listItems) {
          const existing = listItems.find(function(s) {
            return s.name.toLowerCase().trim() === nameKey;
          });
          if (existing) {
            return listItems.map(function(s) {
              return s.id === existing.id ? Object.assign({}, s, { qty: s.qty + 1 }) : s;
            });
          }
          return listItems.concat([{
            id: nextId(listItems),
            name: item.name,
            qty: 1,
            fromStaple: false,
            suggestedCategory: item.category,
            suggestedUnit: item.unit
          }]);
        });
        setHistory(recordHistory(history, item.name, item.category, item.unit));
      }

      function isOnMainList(item) {
        if (!mainList) return false;
        const nameKey = item.name.toLowerCase().trim();
        return mainList.items.some(function(s) {
          return s.name.toLowerCase().trim() === nameKey;
        });
      }

      function addItem() {
        if (!newItem.name.trim()) return;
        setItems(items.concat([Object.assign({}, newItem, {
          id: nextId(items),
          staple: false,
          outOfStock: false
        })]));
        setHistory(recordHistory(history, newItem.name, newItem.category, newItem.unit));
        setNewItem({ name: "", qty: 1, unit: "", category: "Fresh / Other" });
        setShowAdd(false);
      }

      function clearAll() {
        if (confirm("Remove all items from pantry? This cannot be undone.")) {
          setItems([]);
        }
      }

      function handleImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const data = JSON.parse(e.target.result);
            const incoming = Array.isArray(data) ? data : data.items;
            if (!Array.isArray(incoming)) {
              setImportMessage("Invalid file format");
              return;
            }
            let added = 0;
            let merged = 0;
            const list = items.slice();
            let id = nextId(list);
            let newHistory = history.slice();
            incoming.forEach(function(row) {
              if (!row.name) return;
              const existing = list.find(function(i) {
                return i.name.toLowerCase().trim() === row.name.toLowerCase().trim();
              });
              if (existing) {
                existing.qty = existing.qty + (row.qty || 1);
                merged = merged + 1;
              } else {
                list.push({
                  id: id,
                  name: row.name,
                  qty: row.qty || 1,
                  unit: row.unit || "",
                  category: row.category || "Fresh / Other",
                  staple: false,
                  outOfStock: false
                });
                id = id + 1;
                added = added + 1;
              }
              newHistory = recordHistory(newHistory, row.name, row.category, row.unit);
            });
            setItems(list);
            setHistory(newHistory);
            setImportMessage("Imported: " + added + " new, " + merged + " merged");
            setTimeout(function() { setImportMessage(""); }, 4000);
          } catch (err) {
            setImportMessage("Could not read file");
          }
        };
        reader.readAsText(file);
        event.target.value = "";
      }

      const filtered = items.filter(function(item) {
        if (hideEmpty && !item.staple && item.qty === 0) return false;
        if (search && item.name.toLowerCase().indexOf(search.toLowerCase()) === -1) return false;
        return true;
      });

      const staples = filtered.filter(function(i) { return i.staple; });
      const nonStaples = filtered.filter(function(i) { return !i.staple; });

      staples.sort(function(a, b) {
        if (a.outOfStock && !b.outOfStock) return -1;
        if (!a.outOfStock && b.outOfStock) return 1;
        return a.name.localeCompare(b.name);
      });

      const cats = [];
      nonStaples.forEach(function(i) { if (cats.indexOf(i.category) === -1) cats.push(i.category); });

      return (
        <div>
          <div className="bg-white rounded-2xl shadow-sm p-4 mb-4 border border-amber-100">
            <input
              type="text"
              placeholder="Search ingredients..."
              value={search}
              onChange={function(e) { setSearch(e.target.value); }}
              className="w-full px-3 py-2 border border-gray-200 rounded-lg mb-2"
            />
            <div className="flex gap-2">
              <button
                onClick={function() { setHideEmpty(!hideEmpty); }}
                className={hideEmpty
                  ? "flex-1 px-3 py-2 rounded-lg bg-amber-700 text-white font-medium text-sm"
                  : "flex-1 px-3 py-2 rounded-lg bg-white text-gray-700 border border-gray-200 font-medium text-sm"}
              >
                {hideEmpty ? "Hiding empty" : "Hide empty"}
              </button>
              <button
                onClick={function() { setShowAdd(!showAdd); }}
                className="flex-1 px-3 py-2 rounded-lg bg-amber-700 text-white font-medium text-sm"
              >
                + Add
              </button>
              <label className="flex-1 px-3 py-2 rounded-lg bg-sky-700 text-white font-medium text-sm text-center">
                Import
                <input type="file" accept=".json,application/json" onChange={handleImport} style={{display:"none"}} />
              </label>
            </div>

            {importMessage && (
              <div className="mt-3 p-2 bg-green-50 border border-green-200 rounded-lg text-sm text-green-900">
                {importMessage}
              </div>
            )}

            {showAdd && (
              <div className="mt-3 p-3 bg-amber-50 rounded-lg border border-amber-200 space-y-2">
                <input
                  type="text"
                  placeholder="Name"
                  value={newItem.name}
                  onChange={function(e) { setNewItem(Object.assign({}, newItem, { name: e.target.value })); }}
                  className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"
                />
                <input
                  type="text"
                  placeholder="Unit (e.g. 500g bag)"
                  value={newItem.unit}
                  onChange={function(e) { setNewItem(Object.assign({}, newItem, { unit: e.target.value })); }}
                  className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"
                />
                <select
                  value={newItem.category}
                  onChange={function(e) { setNewItem(Object.assign({}, newItem, { category: e.target.value })); }}
                  className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white"
                >
                  {CATEGORIES.map(function(c) { return <option key={c}>{c}</option>; })}
                </select>
                <div className="flex gap-2">
                  <input
                    type="number"
                    min="1"
                    value={newItem.qty}
                    onChange={function(e) { setNewItem(Object.assign({}, newItem, { qty: parseInt(e.target.value) || 1 })); }}
                    className="w-20 px-3 py-2 border border-gray-200 rounded-lg text-sm"
                  />
                  <button
                    onClick={addItem}
                    className="flex-1 px-4 py-2 bg-green-700 text-white rounded-lg text-sm font-medium"
                  >
                    Save
                  </button>
                </div>
              </div>
            )}
          </div>

          <AIHelper />

          {items.length === 0 && (
            <div className="bg-white rounded-2xl p-8 text-center text-gray-500 border border-dashed border-gray-300">
              <div className="text-4xl mb-2">🥣</div>
              <p className="font-medium text-gray-700 mb-1">Your pantry is empty</p>
              <p className="text-sm">Tap <span className="font-semibold text-amber-700">+ Add</span> or <span className="font-semibold text-blue-600">Import</span> to get started</p>
            </div>
          )}

          {staples.length > 0 && (
            <div className="mb-4">
              <h2 className="text-lg font-bold text-gray-800 mb-2 px-1 flex items-center gap-2">
                <span className="text-xl">⭐</span>
                Staples
                <span className="text-sm text-gray-400 font-normal">({staples.length})</span>
              </h2>
              <div className="space-y-2">
                {staples.map(function(item) {
                  const out = item.outOfStock;
                  return (
                    <div
                      key={item.id}
                      className={out
                        ? "bg-amber-50 rounded-xl shadow-sm border-2 border-amber-300 p-3 flex items-center gap-3"
                        : "bg-white rounded-xl shadow-sm border border-gray-200 p-3 flex items-center gap-3"}
                    >
                      <button
                        onClick={function() { toggleStaple(item.id); }}
                        className="flex-shrink-0 w-7 h-7 flex items-center justify-center text-xl"
                      >⭐</button>
                      <div className="flex-1 min-w-0">
                        <div className="font-medium text-gray-900">{item.name}</div>
                        <div className="text-xs text-gray-500">{out ? "Need to buy" : "In stock"}</div>
                      </div>
                      <button
                        onClick={function() { toggleStapleStock(item.id); }}
                        className={out
                          ? "px-3 py-1.5 rounded-lg bg-amber-500 text-white text-sm font-medium"
                          : "px-3 py-1.5 rounded-lg bg-green-50 text-green-800 text-sm font-medium"}
                      >
                        {out ? "Need" : "Have"}
                      </button>
                      <button
                        onClick={function() { removeItem(item.id); }}
                        className="w-7 h-7 flex items-center justify-center text-gray-400"
                      >🗑</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {cats.map(function(category) {
            const categoryItems = nonStaples.filter(function(i) { return i.category === category; });
            if (categoryItems.length === 0) return null;
            return (
              <div key={category} className="mb-4">
                <h2 className="text-lg font-bold text-gray-800 mb-2 px-1 flex items-center gap-2">
                  <span className="text-xl">{categoryIcons[category]}</span>
                  {category}
                  <span className="text-sm text-gray-400 font-normal">({categoryItems.length})</span>
                </h2>
                <div className="space-y-2">
                  {categoryItems.map(function(item) {
                    const dimmed = item.qty === 0;
                    const onList = isOnMainList(item);
                    return (
                      <div
                        key={item.id}
                        className={dimmed
                          ? "bg-white rounded-xl shadow-sm border border-gray-200 p-3 flex items-center gap-2 opacity-50"
                          : "bg-white rounded-xl shadow-sm border border-gray-200 p-3 flex items-center gap-2"}
                      >
                        <button
                          onClick={function() { toggleStaple(item.id); }}
                          className="flex-shrink-0 w-7 h-7 flex items-center justify-center text-gray-300 text-xl"
                        >☆</button>
                        <div className="flex-1 min-w-0">
                          <div className="font-medium text-gray-900">{item.name}</div>
                          <div className="text-xs text-gray-500">{item.unit}</div>
                        </div>
                        <div className="flex items-center gap-1 bg-gray-50 rounded-lg p-1">
                          <button
                            onClick={function() { adjustQty(item.id, -1); }}
                            className="w-7 h-7 flex items-center justify-center text-gray-600 font-bold"
                          >−</button>
                          <span className="w-6 text-center font-bold text-gray-900 text-sm">{item.qty}</span>
                          <button
                            onClick={function() { adjustQty(item.id, 1); }}
                            className="w-7 h-7 flex items-center justify-center text-gray-600 font-bold"
                          >+</button>
                        </div>
                        <button
                          onClick={function() { if (!onList) addToMainList(item); }}
                          disabled={onList}
                          className={onList
                            ? "w-8 h-8 flex items-center justify-center text-gray-300 cursor-not-allowed"
                            : "w-8 h-8 flex items-center justify-center text-amber-700"}
                          title={onList ? "Already on shopping list" : "Add to shopping list"}
                        >🛒</button>
                        <button
                          onClick={function() { removeItem(item.id); }}
                          className="w-7 h-7 flex items-center justify-center text-gray-400"
                        >🗑</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {items.length > 0 && filtered.length === 0 && (
            <div className="bg-white rounded-2xl p-8 text-center text-gray-500 border border-dashed border-gray-300">
              <p>No ingredients match your filter</p>
            </div>
          )}

          {items.length > 0 && (
            <div className="mt-6 flex justify-center">
              <button onClick={clearAll} className="text-sm text-gray-500 underline">
                Clear entire pantry
              </button>
            </div>
          )}
        </div>
      );
    }

    function ShoppingView(props) {
      const items = props.items;
      const setItems = props.setItems;
      const lists = props.lists;
      const setLists = props.setLists;
      const activeListId = props.activeListId;
      const setActiveListId = props.setActiveListId;
      const activeList = props.activeList;
      const updateActiveList = props.updateActiveList;
      const history = props.history;
      const setHistory = props.setHistory;
      const alwaysBuy = props.alwaysBuy;
      const setAlwaysBuy = props.setAlwaysBuy;
      const gridExpanded = props.gridExpanded;
      const setGridExpanded = props.setGridExpanded;

      const [input, setInput] = useState("");
      const [importMessage, setImportMessage] = useState("");
      const [voiceState, setVoiceState] = useState("idle"); // idle, listening, transcript
      const [transcript, setTranscript] = useState("");
      const [longPressItem, setLongPressItem] = useState(null);
      const recognitionRef = useRef(null);
      const longPressTimerRef = useRef(null);

      const isMain = activeList && activeList.isMain;
      const voiceSupported = typeof window !== "undefined" &&
        ("SpeechRecognition" in window || "webkitSpeechRecognition" in window);

      // Auto-add always-buy items to main list when it's empty (after a clear)
      useEffect(function() {
        if (!isMain || !activeList) return;
        if (activeList.items.length === 0 && alwaysBuy.length > 0) {
          // Only add if there's a flag indicating list was explicitly cleared
          const lastCleared = localStorage.getItem("spiskammer-main-cleared");
          if (lastCleared === "true") {
            const newItems = alwaysBuy.map(function(ab, idx) {
              return {
                id: idx + 1,
                name: ab.name,
                qty: 1,
                fromStaple: false,
                fromAlwaysBuy: true,
                suggestedCategory: ab.category || "",
                suggestedUnit: ab.unit || ""
              };
            });
            updateActiveList(function() { return newItems; });
            localStorage.removeItem("spiskammer-main-cleared");
          }
        }
      }, [isMain, activeList, alwaysBuy]);

      function addToList(name, category, unit) {
        const nameKey = name.toLowerCase().trim();
        if (!nameKey) return;
        updateActiveList(function(listItems) {
          const existing = listItems.find(function(s) {
            return s.name.toLowerCase().trim() === nameKey;
          });
          if (existing) {
            return listItems.map(function(s) {
              return s.id === existing.id ? Object.assign({}, s, { qty: s.qty + 1 }) : s;
            });
          }
          return listItems.concat([{
            id: nextId(listItems),
            name: name,
            qty: 1,
            fromStaple: false,
            suggestedCategory: category || "",
            suggestedUnit: unit || ""
          }]);
        });
        if (isMain) {
          setHistory(recordHistory(history, name, category, unit));
        }
      }

      function submitInput() {
        if (!input.trim()) return;
        const key = input.toLowerCase().trim();
        const hit = history.find(function(h) { return h.key === key; });
        addToList(input.trim(), hit ? hit.lastCategory : "", hit ? hit.lastUnit : "");
        setInput("");
      }

      function removeFromList(id) {
        const item = activeList.items.find(function(s) { return s.id === id; });
        if (!item) return;
        if (item.fromStaple && isMain) {
          const nameKey = item.name.toLowerCase().trim();
          setItems(items.map(function(i) {
            if (i.staple && i.name.toLowerCase().trim() === nameKey) {
              return Object.assign({}, i, { outOfStock: false });
            }
            return i;
          }));
        }
        updateActiveList(function(listItems) {
          return listItems.filter(function(s) { return s.id !== id; });
        });
      }

      function moveToPantry(id) {
        const item = activeList.items.find(function(s) { return s.id === id; });
        if (!item) return;
        const nameKey = item.name.toLowerCase().trim();

        // Always-buy items just disappear from list, don't go to pantry
        if (item.fromAlwaysBuy) {
          updateActiveList(function(listItems) {
            return listItems.filter(function(s) { return s.id !== id; });
          });
          return;
        }

        if (isMain) {
          // Match against pantry staples
          const stapleMatch = items.find(function(i) {
            return i.staple && i.name.toLowerCase().trim() === nameKey;
          });
          if (stapleMatch) {
            setItems(items.map(function(i) {
              return i.id === stapleMatch.id ? Object.assign({}, i, { outOfStock: false }) : i;
            }));
            updateActiveList(function(listItems) {
              return listItems.filter(function(s) { return s.id !== id; });
            });
            return;
          }

          // Match against existing pantry item
          const pantryMatch = items.find(function(i) {
            return !i.staple && i.name.toLowerCase().trim() === nameKey;
          });
          if (pantryMatch) {
            setItems(items.map(function(i) {
              return i.id === pantryMatch.id ? Object.assign({}, i, { qty: i.qty + item.qty }) : i;
            }));
            updateActiveList(function(listItems) {
              return listItems.filter(function(s) { return s.id !== id; });
            });
            return;
          }

          // New pantry item
          const category = item.suggestedCategory || "Fresh / Other";
          const unit = item.suggestedUnit || "";
          setItems(items.concat([{
            id: nextId(items),
            name: item.name,
            qty: item.qty,
            unit: unit,
            category: category,
            staple: false,
            outOfStock: false
          }]));
        }

        updateActiveList(function(listItems) {
          return listItems.filter(function(s) { return s.id !== id; });
        });
      }

      function adjustListQty(id, delta) {
        updateActiveList(function(listItems) {
          return listItems.map(function(s) {
            return s.id === id ? Object.assign({}, s, { qty: Math.max(1, s.qty + delta) }) : s;
          });
        });
      }

      function clearList() {
        if (!activeList || activeList.items.length === 0) return;
        if (confirm("Clear the " + activeList.name + " list?")) {
          // Reset staples that were on main list
          if (isMain) {
            const stapleNames = activeList.items
              .filter(function(s) { return s.fromStaple; })
              .map(function(s) { return s.name.toLowerCase().trim(); });
            if (stapleNames.length > 0) {
              setItems(items.map(function(i) {
                if (i.staple && stapleNames.indexOf(i.name.toLowerCase().trim()) !== -1) {
                  return Object.assign({}, i, { outOfStock: false });
                }
                return i;
              }));
            }
            // Set flag so always-buy items will repopulate
            localStorage.setItem("spiskammer-main-cleared", "true");
          }
          updateActiveList(function() { return []; });
        }
      }

      function createNewList() {
        const name = prompt("Name of the new list?");
        if (!name || !name.trim()) return;
        const newId = "list_" + Date.now();
        setLists(lists.concat([{
          id: newId,
          name: name.trim(),
          items: [],
          deletable: true,
          isMain: false
        }]));
        setActiveListId(newId);
      }

      function renameList(listId) {
        const target = lists.find(function(l) { return l.id === listId; });
        if (!target) return;
        const newName = prompt("New name for this list?", target.name);
        if (!newName || !newName.trim()) return;
        setLists(lists.map(function(l) {
          return l.id === listId ? Object.assign({}, l, { name: newName.trim() }) : l;
        }));
      }

      function deleteList(listId) {
        const target = lists.find(function(l) { return l.id === listId; });
        if (!target || !target.deletable) return;
        if (!confirm("Delete the '" + target.name + "' list? Items on it will be lost.")) return;
        const remaining = lists.filter(function(l) { return l.id !== listId; });
        setLists(remaining);
        if (activeListId === listId) {
          setActiveListId(remaining[0].id);
        }
      }

      function handleListPillLongPress(listId) {
        const target = lists.find(function(l) { return l.id === listId; });
        if (!target || !target.deletable) {
          // Main list can be renamed only
          if (target && target.isMain) {
            renameList(listId);
          }
          return;
        }
        const choice = prompt("Type 'rename' or 'delete' for the '" + target.name + "' list:");
        if (choice === "rename") renameList(listId);
        else if (choice === "delete") deleteList(listId);
      }

      function handleImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const data = JSON.parse(e.target.result);
            const incoming = Array.isArray(data) ? data : data.items;
            if (!Array.isArray(incoming)) {
              setImportMessage("Invalid file format");
              return;
            }
            let added = 0;
            let merged = 0;
            updateActiveList(function(listItems) {
              const list = listItems.slice();
              let id = nextId(list);
              incoming.forEach(function(row) {
                if (!row.name) return;
                const existing = list.find(function(s) {
                  return s.name.toLowerCase().trim() === row.name.toLowerCase().trim();
                });
                if (existing) {
                  existing.qty = existing.qty + (row.qty || 1);
                  merged = merged + 1;
                } else {
                  list.push({
                    id: id,
                    name: row.name,
                    qty: row.qty || 1,
                    fromStaple: false,
                    suggestedCategory: row.category || "",
                    suggestedUnit: row.unit || ""
                  });
                  id = id + 1;
                  added = added + 1;
                }
              });
              return list;
            });
            if (isMain) {
              let newHistory = history.slice();
              incoming.forEach(function(row) {
                if (row.name) newHistory = recordHistory(newHistory, row.name, row.category, row.unit);
              });
              setHistory(newHistory);
            }
            setImportMessage("Imported: " + added + " new, " + merged + " merged");
            setTimeout(function() { setImportMessage(""); }, 4000);
          } catch (err) {
            setImportMessage("Could not read file");
          }
        };
        reader.readAsText(file);
        event.target.value = "";
      }

      function startVoice() {
        if (!voiceSupported) return;
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SR();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = "en-GB";
        let finalText = "";
        recognition.onresult = function(event) {
          for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
              finalText = finalText + " " + event.results[i][0].transcript;
            }
          }
          setTranscript(finalText.trim());
        };
        recognition.onerror = function() {
          setVoiceState("idle");
        };
        recognition.onend = function() {
          if (finalText.trim()) {
            setTranscript(finalText.trim());
            setVoiceState("transcript");
          } else {
            setVoiceState("idle");
          }
        };
        recognition.start();
        recognitionRef.current = recognition;
        setVoiceState("listening");
        setTranscript("");
      }

      function stopVoice() {
        if (recognitionRef.current) {
          recognitionRef.current.stop();
        }
      }

      function commitTranscript() {
        if (!transcript.trim()) {
          setVoiceState("idle");
          return;
        }
        const fragments = transcript.split(/,|\band\b/i);
        fragments.forEach(function(frag) {
          const parsed = parseVoiceFragment(frag);
          if (parsed && parsed.name) {
            const key = parsed.name.toLowerCase().trim();
            const hit = history.find(function(h) { return h.key === key; });
            updateActiveList(function(listItems) {
              const existing = listItems.find(function(s) {
                return s.name.toLowerCase().trim() === key;
              });
              if (existing) {
                return listItems.map(function(s) {
                  return s.id === existing.id ? Object.assign({}, s, { qty: s.qty + parsed.qty }) : s;
                });
              }
              return listItems.concat([{
                id: nextId(listItems),
                name: parsed.name,
                qty: parsed.qty,
                fromStaple: false,
                suggestedCategory: hit ? hit.lastCategory : "",
                suggestedUnit: hit ? hit.lastUnit : ""
              }]);
            });
            if (isMain) {
              setHistory(function(h) {
                return recordHistory(h.slice ? h.slice() : h, parsed.name,
                  hit ? hit.lastCategory : "", hit ? hit.lastUnit : "");
              });
            }
          }
        });
        setTranscript("");
        setVoiceState("idle");
      }

      function cancelTranscript() {
        setTranscript("");
        setVoiceState("idle");
      }

      function startLongPress(itemId) {
        longPressTimerRef.current = setTimeout(function() {
          setLongPressItem(itemId);
        }, 600);
      }

      function cancelLongPress() {
        if (longPressTimerRef.current) {
          clearTimeout(longPressTimerRef.current);
          longPressTimerRef.current = null;
        }
      }

      function toggleAlwaysBuy(itemName, category, unit) {
        const nameKey = itemName.toLowerCase().trim();
        const existing = alwaysBuy.find(function(ab) { return ab.name.toLowerCase().trim() === nameKey; });
        if (existing) {
          setAlwaysBuy(alwaysBuy.filter(function(ab) { return ab.name.toLowerCase().trim() !== nameKey; }));
        } else {
          setAlwaysBuy(alwaysBuy.concat([{
            name: itemName,
            category: category || "",
            unit: unit || ""
          }]));
        }
      }

      function isAlwaysBuy(itemName) {
        const nameKey = itemName.toLowerCase().trim();
        return alwaysBuy.some(function(ab) { return ab.name.toLowerCase().trim() === nameKey; });
      }

      // Quick-add grid: only on main list, only items not already on list
      const showGrid = isMain;
      const listNames = activeList ? activeList.items.map(function(s) { return s.name.toLowerCase().trim(); }) : [];
      const gridCandidates = history
        .filter(function(h) { return listNames.indexOf(h.key) === -1; })
        .slice()
        .sort(function(a, b) { return b.addCount - a.addCount; });

      const gridFiltered = input.trim()
        ? gridCandidates.filter(function(h) {
            return h.name.toLowerCase().indexOf(input.toLowerCase()) !== -1;
          })
        : gridCandidates;

      // Auto-expand on type
      const effectiveExpanded = gridExpanded || input.trim().length > 0;
      const gridDisplay = gridFiltered.slice(0, 18);

      const suggestions = isMain && input.trim()
        ? history
            .filter(function(h) { return h.name.toLowerCase().indexOf(input.toLowerCase()) !== -1; })
            .slice(0, 5)
        : [];

      // Sort items: always-buy first, then staple-derived, then rest
      const sortedItems = activeList ? activeList.items.slice().sort(function(a, b) {
        const aAlwaysBuy = a.fromAlwaysBuy || (isMain && isAlwaysBuy(a.name));
        const bAlwaysBuy = b.fromAlwaysBuy || (isMain && isAlwaysBuy(b.name));
        if (aAlwaysBuy && !bAlwaysBuy) return -1;
        if (!aAlwaysBuy && bAlwaysBuy) return 1;
        if (a.fromStaple && !b.fromStaple) return -1;
        if (!a.fromStaple && b.fromStaple) return 1;
        return 0;
      }) : [];

      return (
        <div>
          {/* List pills */}
          <div className="bg-white rounded-2xl shadow-sm p-3 mb-4 border border-amber-100">
            <div className="flex gap-2 overflow-x-auto pb-1">
              {lists.map(function(l) {
                return (
                  <button
                    key={l.id}
                    onClick={function() { setActiveListId(l.id); }}
                    onContextMenu={function(e) {
                      e.preventDefault();
                      handleListPillLongPress(l.id);
                    }}
                    onTouchStart={function() {
                      longPressTimerRef.current = setTimeout(function() {
                        handleListPillLongPress(l.id);
                      }, 600);
                    }}
                    onTouchEnd={cancelLongPress}
                    onTouchMove={cancelLongPress}
                    className={l.id === activeListId
                      ? "px-3 py-1.5 rounded-lg bg-amber-700 text-white font-medium text-sm whitespace-nowrap flex-shrink-0"
                      : "px-3 py-1.5 rounded-lg bg-white text-gray-700 border border-gray-200 font-medium text-sm whitespace-nowrap flex-shrink-0"}
                  >
                    {l.isMain ? "⭐ " : ""}{l.name}
                  </button>
                );
              })}
              <button
                onClick={createNewList}
                className="px-3 py-1.5 rounded-lg bg-white text-gray-500 border border-dashed border-gray-300 font-medium text-sm flex-shrink-0"
              >
                +
              </button>
            </div>
          </div>

          {/* Add input + buttons */}
          <div className="bg-white rounded-2xl shadow-sm p-4 mb-4 border border-amber-100">
            <div className="flex gap-2">
              <input
                type="text"
                placeholder="Add item..."
                value={input}
                onChange={function(e) { setInput(e.target.value); }}
                onKeyDown={function(e) { if (e.key === "Enter") submitInput(); }}
                className="flex-1 px-3 py-2 border border-gray-200 rounded-lg"
              />
              <button
                onClick={submitInput}
                className="px-4 py-2 rounded-lg bg-amber-700 text-white font-medium text-sm"
              >
                Add
              </button>
            </div>

            <div className="flex gap-2 mt-2">
              <label className="flex-1 px-3 py-2 rounded-lg bg-sky-700 text-white font-medium text-sm text-center">
                📥 Import
                <input type="file" accept=".json,application/json" onChange={handleImport} style={{display:"none"}} />
              </label>
              {voiceSupported && (
                <button
                  onClick={voiceState === "listening" ? stopVoice : startVoice}
                  className={voiceState === "listening"
                    ? "flex-1 px-3 py-2 rounded-lg pulse-red text-white font-medium text-sm"
                    : "flex-1 px-3 py-2 rounded-lg bg-green-700 text-white font-medium text-sm"}
                >
                  🎤 {voiceState === "listening" ? "Stop" : "Voice"}
                </button>
              )}
            </div>

            {voiceState === "transcript" && (
              <div className="mt-3 p-3 bg-green-50 border border-green-200 rounded-lg space-y-2">
                <div className="text-sm text-green-900">
                  <span className="font-medium">Heard:</span> "{transcript}"
                </div>
                <div className="flex gap-2">
                  <button
                    onClick={commitTranscript}
                    className="flex-1 px-3 py-1.5 rounded-lg bg-green-700 text-white text-sm font-medium"
                  >
                    Add all
                  </button>
                  <button
                    onClick={cancelTranscript}
                    className="px-3 py-1.5 rounded-lg bg-white text-gray-700 border border-gray-200 text-sm font-medium"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            )}

            {importMessage && (
              <div className="mt-3 p-2 bg-green-50 border border-green-200 rounded-lg text-sm text-green-900">
                {importMessage}
              </div>
            )}

            {suggestions.length > 0 && (
              <div className="mt-2 border border-gray-200 rounded-lg overflow-hidden bg-white">
                {suggestions.map(function(s) {
                  return (
                    <button
                      key={s.key}
                      onClick={function() {
                        addToList(s.name, s.lastCategory, s.lastUnit);
                        setInput("");
                      }}
                      className="w-full text-left px-3 py-2 border-b border-gray-100 last:border-b-0 text-sm flex items-center justify-between"
                    >
                      <span>{s.name}</span>
                      <span className="text-xs text-gray-400">×{s.addCount}</span>
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {/* AI Helper */}
          <AIHelper />

          {/* Quick-add grid (collapsible, main list only) */}
          {showGrid && gridCandidates.length > 0 && (
            <div className="mb-4">
              <button
                onClick={function() { setGridExpanded(!gridExpanded); }}
                className="w-full px-3 py-2 rounded-xl bg-white border border-amber-100 shadow-sm flex items-center justify-between"
              >
                <span className="font-bold text-gray-800 flex items-center gap-2">
                  <span className="text-xl">✨</span>
                  Quick add
                  <span className="text-sm text-gray-400 font-normal">
                    {input.trim() ? "(" + gridFiltered.length + " matches)" : "(" + gridCandidates.length + ")"}
                  </span>
                </span>
                <span className="text-amber-700">{effectiveExpanded ? "▲" : "▼"}</span>
              </button>
              {effectiveExpanded && (
                <div className="grid grid-cols-3 gap-2 mt-2">
                  {gridDisplay.map(function(h) {
                    const catColor = categoryColors[h.lastCategory] || "bg-gray-100 text-gray-800";
                    return (
                      <button
                        key={h.key}
                        onClick={function() { addToList(h.name, h.lastCategory, h.lastUnit); }}
                        className={catColor + " rounded-xl p-3 text-sm font-medium shadow-sm border border-white/50 active:scale-95 transition-transform"}
                      >
                        {h.name}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* Shopping list items */}
          {!activeList || activeList.items.length === 0 ? (
            <div className="bg-white rounded-2xl p-8 text-center text-gray-500 border border-dashed border-gray-300">
              <div className="text-4xl mb-2">🛒</div>
              <p className="font-medium text-gray-700 mb-1">{activeList ? activeList.name : "List"} is empty</p>
              <p className="text-sm">
                {isMain ? "Add items above, mark pantry items as staples (⭐), or use 🛒 from the pantry" : "Add items above"}
              </p>
            </div>
          ) : (
            <div className="mb-4">
              <h2 className="text-lg font-bold text-gray-800 mb-2 px-1 flex items-center gap-2">
                <span className="text-xl">🛒</span>
                {activeList.name}
                <span className="text-sm text-gray-400 font-normal">({activeList.items.length})</span>
              </h2>
              <div className="space-y-2">
                {sortedItems.map(function(s) {
                  const itemIsAlwaysBuy = s.fromAlwaysBuy || (isMain && isAlwaysBuy(s.name));
                  return (
                    <div
                      key={s.id}
                      onContextMenu={function(e) {
                        e.preventDefault();
                        if (isMain) setLongPressItem(s.id);
                      }}
                      onTouchStart={function() { if (isMain) startLongPress(s.id); }}
                      onTouchEnd={cancelLongPress}
                      onTouchMove={cancelLongPress}
                      className="bg-white rounded-xl shadow-sm border border-gray-200 p-3 flex items-center gap-2"
                    >
                      {itemIsAlwaysBuy && (
                        <span className="text-lg" title="Always-buy item">📌</span>
                      )}
                      {s.fromStaple && !itemIsAlwaysBuy && (
                        <span className="text-amber-500 text-lg" title="From staples">⭐</span>
                      )}
                      <div className="flex-1 min-w-0">
                        <div className="font-medium text-gray-900">{s.name}</div>
                      </div>
                      <div className="flex items-center gap-1 bg-gray-50 rounded-lg p-1">
                        <button
                          onClick={function() { adjustListQty(s.id, -1); }}
                          className="w-7 h-7 flex items-center justify-center text-gray-600 font-bold"
                        >−</button>
                        <span className="w-6 text-center font-bold text-gray-900 text-sm">{s.qty}</span>
                        <button
                          onClick={function() { adjustListQty(s.id, 1); }}
                          className="w-7 h-7 flex items-center justify-center text-gray-600 font-bold"
                        >+</button>
                      </div>
                      <button
                        onClick={function() { moveToPantry(s.id); }}
                        className="w-12 h-12 rounded-xl bg-green-700 text-white flex items-center justify-center font-bold text-xl shadow-sm"
                        title="Bought"
                      >✓</button>
                      <button
                        onClick={function() { removeFromList(s.id); }}
                        className="w-7 h-7 flex items-center justify-center text-gray-400 text-sm"
                        title="Remove"
                      >🗑</button>
                    </div>
                  );
                })}
              </div>

              <div className="mt-6 flex justify-center">
                <button onClick={clearList} className="text-sm text-gray-500 underline">
                  Clear {activeList.name} list
                </button>
              </div>
            </div>
          )}

          {/* Long-press menu */}
          {longPressItem !== null && (function() {
            const item = activeList.items.find(function(s) { return s.id === longPressItem; });
            if (!item) return null;
            const itemIsAlwaysBuy = isAlwaysBuy(item.name);
            return (
              <div
                className="fixed inset-0 bg-black/40 flex items-end justify-center z-50"
                onClick={function() { setLongPressItem(null); }}
              >
                <div
                  className="bg-white rounded-t-2xl w-full max-w-2xl p-4 space-y-2"
                  onClick={function(e) { e.stopPropagation(); }}
                >
                  <div className="text-center font-medium text-gray-900 pb-2 border-b border-gray-100">
                    {item.name}
                  </div>
                  <button
                    onClick={function() {
                      toggleAlwaysBuy(item.name, item.suggestedCategory, item.suggestedUnit);
                      setLongPressItem(null);
                    }}
                    className="w-full px-3 py-3 rounded-lg bg-amber-50 text-amber-900 font-medium text-sm flex items-center gap-2"
                  >
                    📌 {itemIsAlwaysBuy ? "Remove from always-buy" : "Mark as always-buy"}
                  </button>
                  <button
                    onClick={function() { setLongPressItem(null); }}
                    className="w-full px-3 py-3 rounded-lg bg-gray-50 text-gray-700 font-medium text-sm"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("sw.js").catch(function(err) { console.error(err); });
      });
    }
  </script>
</body>
</html>

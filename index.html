<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f97316" />
  <title>My Pantry</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const CATEGORIES = [
      "Canned & Boxed",
      "Grains & Legumes",
      "Spices & Seasonings",
      "Sauces & Wet",
      "Fresh / Other"
    ];

    const categoryIcons = {
      "Canned & Boxed": "🥫",
      "Grains & Legumes": "🌾",
      "Spices & Seasonings": "🌶️",
      "Sauces & Wet": "🧂",
      "Fresh / Other": "🥬"
    };

    const categoryColors = {
      "Canned & Boxed": "bg-amber-100 text-amber-900",
      "Grains & Legumes": "bg-yellow-100 text-yellow-900",
      "Spices & Seasonings": "bg-red-100 text-red-900",
      "Sauces & Wet": "bg-blue-100 text-blue-900",
      "Fresh / Other": "bg-green-100 text-green-900"
    };

    function loadJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) { return fallback; }
    }

    function saveJSON(key, value) {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
    }

    function nextId(list) {
      const ids = list.map(function(i) { return i.id; });
      return ids.length ? Math.max.apply(null, ids) + 1 : 1;
    }

    function recordHistory(history, name, category, unit) {
      const key = name.toLowerCase().trim();
      const existing = history.find(function(h) { return h.key === key; });
      const now = new Date().toISOString();
      if (existing) {
        existing.addCount = existing.addCount + 1;
        existing.lastAdded = now;
        if (category) existing.lastCategory = category;
        if (unit) existing.lastUnit = unit;
      } else {
        history.push({
          key: key,
          name: name,
          addCount: 1,
          lastAdded: now,
          lastCategory: category || "Fresh / Other",
          lastUnit: unit || ""
        });
      }
      return history.slice();
    }

    function App() {
      const [tab, setTab] = useState("pantry");
      const [items, setItems] = useState(function() { return loadJSON("pantry-items", []); });
      const [shoppingList, setShoppingList] = useState(function() { return loadJSON("pantry-shopping", []); });
      const [history, setHistory] = useState(function() { return loadJSON("pantry-history", []); });

      useEffect(function() { saveJSON("pantry-items", items); }, [items]);
      useEffect(function() { saveJSON("pantry-shopping", shoppingList); }, [shoppingList]);
      useEffect(function() { saveJSON("pantry-history", history); }, [history]);

      return (
        <div className="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50">
          <div className="max-w-2xl mx-auto p-4 pb-24">
            <Header tab={tab} setTab={setTab} />
            {tab === "pantry" ? (
              <PantryView
                items={items}
                setItems={setItems}
                shoppingList={shoppingList}
                setShoppingList={setShoppingList}
                history={history}
                setHistory={setHistory}
              />
            ) : (
              <ShoppingView
                items={items}
                setItems={setItems}
                shoppingList={shoppingList}
                setShoppingList={setShoppingList}
                history={history}
                setHistory={setHistory}
              />
            )}
          </div>
        </div>
      );
    }

    function Header(props) {
      const tab = props.tab;
      const setTab = props.setTab;
      return (
        <div className="bg-white rounded-2xl shadow-lg p-5 mb-4 border border-orange-200">
          <div className="flex items-center gap-3 mb-3">
            <div className="bg-orange-500 p-2 rounded-xl text-2xl">📦</div>
            <div>
              <h1 className="text-2xl font-bold text-gray-900">My Pantry</h1>
              <p className="text-sm text-gray-500">Home kitchen tracker</p>
            </div>
          </div>
          <div className="flex gap-2">
            <button
              onClick={function() { setTab("pantry"); }}
              className={tab === "pantry"
                ? "flex-1 px-3 py-2 rounded-lg bg-orange-500 text-white font-medium text-sm"
                : "flex-1 px-3 py-2 rounded-lg bg-white text-gray-700 border border-gray-200 font-medium text-sm"}
            >
              📦 Pantry
            </button>
            <button
              onClick={function() { setTab("shopping"); }}
              className={tab === "shopping"
                ? "flex-1 px-3 py-2 rounded-lg bg-orange-500 text-white font-medium text-sm"
                : "flex-1 px-3 py-2 rounded-lg bg-white text-gray-700 border border-gray-200 font-medium text-sm"}
            >
              🛒 Shopping
            </button>
          </div>
        </div>
      );
    }

    function PantryView(props) {
      const items = props.items;
      const setItems = props.setItems;
      const shoppingList = props.shoppingList;
      const setShoppingList = props.setShoppingList;
      const history = props.history;
      const setHistory = props.setHistory;

      const [search, setSearch] = useState("");
      const [hideEmpty, setHideEmpty] = useState(false);
      const [showAdd, setShowAdd] = useState(false);
      const [newItem, setNewItem] = useState({ name: "", qty: 1, unit: "", category: "Fresh / Other" });
      const [importMessage, setImportMessage] = useState("");

      function adjustQty(id, delta) {
        setItems(items.map(function(i) {
          return i.id === id ? Object.assign({}, i, { qty: Math.max(0, i.qty + delta) }) : i;
        }));
      }

      function toggleUsed(id) {
        setItems(items.map(function(i) {
          return i.id === id ? Object.assign({}, i, { used: !i.used }) : i;
        }));
      }

      function removeItem(id) {
        setItems(items.filter(function(i) { return i.id !== id; }));
      }

      function toggleStaple(id) {
        const item = items.find(function(i) { return i.id === id; });
        if (!item) return;
        const becomingStaple = !item.staple;
        setItems(items.map(function(i) {
          if (i.id !== id) return i;
          return Object.assign({}, i, {
            staple: becomingStaple,
            outOfStock: becomingStaple ? false : i.outOfStock
          });
        }));
        // If unstarring a staple that was out of stock, remove from shopping list too
        if (!becomingStaple && item.outOfStock) {
          setShoppingList(shoppingList.filter(function(s) {
            return !(s.fromStaple && s.name.toLowerCase().trim() === item.name.toLowerCase().trim());
          }));
        }
      }

      function toggleStapleStock(id) {
        const item = items.find(function(i) { return i.id === id; });
        if (!item) return;
        const nowOut = !item.outOfStock;
        setItems(items.map(function(i) {
          return i.id === id ? Object.assign({}, i, { outOfStock: nowOut }) : i;
        }));
        // Sync with shopping list
        const nameKey = item.name.toLowerCase().trim();
        if (nowOut) {
          // Add to shopping list if not already there
          const alreadyOnList = shoppingList.find(function(s) {
            return s.name.toLowerCase().trim() === nameKey;
          });
          if (!alreadyOnList) {
            setShoppingList(shoppingList.concat([{
              id: nextId(shoppingList),
              name: item.name,
              qty: 1,
              fromStaple: true
            }]));
          }
        } else {
          // Remove staple-originated entry from shopping list
          setShoppingList(shoppingList.filter(function(s) {
            return !(s.fromStaple && s.name.toLowerCase().trim() === nameKey);
          }));
        }
      }

      function addItem() {
        if (!newItem.name.trim()) return;
        setItems(items.concat([Object.assign({}, newItem, {
          id: nextId(items),
          used: false,
          staple: false,
          outOfStock: false
        })]));
        setHistory(recordHistory(history, newItem.name, newItem.category, newItem.unit));
        setNewItem({ name: "", qty: 1, unit: "", category: "Fresh / Other" });
        setShowAdd(false);
      }

      function clearAll() {
        if (confirm("Remove all items from pantry? This cannot be undone.")) {
          setItems([]);
        }
      }

      function handleImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const data = JSON.parse(e.target.result);
            const incoming = Array.isArray(data) ? data : data.items;
            if (!Array.isArray(incoming)) {
              setImportMessage("Invalid file format");
              return;
            }
            let added = 0;
            let merged = 0;
            const list = items.slice();
            let id = nextId(list);
            let newHistory = history.slice();
            incoming.forEach(function(row) {
              if (!row.name) return;
              const existing = list.find(function(i) {
                return i.name.toLowerCase().trim() === row.name.toLowerCase().trim();
              });
              if (existing) {
                existing.qty = existing.qty + (row.qty || 1);
                merged = merged + 1;
              } else {
                list.push({
                  id: id,
                  name: row.name,
                  qty: row.qty || 1,
                  unit: row.unit || "",
                  category: row.category || "Fresh / Other",
                  used: false,
                  staple: false,
                  outOfStock: false
                });
                id = id + 1;
                added = added + 1;
              }
              newHistory = recordHistory(newHistory, row.name, row.category, row.unit);
            });
            setItems(list);
            setHistory(newHistory);
            setImportMessage("Imported: " + added + " new, " + merged + " merged");
            setTimeout(function() { setImportMessage(""); }, 4000);
          } catch (err) {
            setImportMessage("Could not read file");
          }
        };
        reader.readAsText(file);
        event.target.value = "";
      }

      const filtered = items.filter(function(item) {
        if (hideEmpty && !item.staple && item.qty === 0) return false;
        if (search && item.name.toLowerCase().indexOf(search.toLowerCase()) === -1) return false;
        return true;
      });

      const staples = filtered.filter(function(i) { return i.staple; });
      const nonStaples = filtered.filter(function(i) { return !i.staple; });

      // Sort staples: out of stock first
      staples.sort(function(a, b) {
        if (a.outOfStock && !b.outOfStock) return -1;
        if (!a.outOfStock && b.outOfStock) return 1;
        return a.name.localeCompare(b.name);
      });

      const cats = [];
      nonStaples.forEach(function(i) { if (cats.indexOf(i.category) === -1) cats.push(i.category); });

      const totalItems = items.filter(function(i) { return i.staple || i.qty > 0; }).length;
      const usedItems = items.filter(function(i) { return i.used; }).length;

      return (
        <div>
          <div className="bg-white rounded-2xl shadow-sm p-4 mb-4 border border-orange-100">
            <div className="flex gap-3 text-sm mb-3">
              <div className="bg-orange-100 px-3 py-1.5 rounded-lg text-orange-900 font-medium">
                {totalItems} in stock
              </div>
              <div className="bg-green-100 px-3 py-1.5 rounded-lg text-green-900 font-medium">
                {usedItems} used
              </div>
            </div>
            <input
              type="text"
              placeholder="Search ingredients..."
              value={search}
              onChange={function(e) { setSearch(e.target.value); }}
              className="w-full px-3 py-2 border border-gray-200 rounded-lg mb-2"
            />
            <div className="flex gap-2">
              <button
                onClick={function() { setHideEmpty(!hideEmpty); }}
                className={hideEmpty
                  ? "flex-1 px-3 py-2 rounded-lg bg-orange-500 text-white font-medium text-sm"
                  : "flex-1 px-3 py-2 rounded-lg bg-white text-gray-700 border border-gray-200 font-medium text-sm"}
              >
                {hideEmpty ? "Hiding empty" : "Hide empty"}
              </button>
              <button
                onClick={function() { setShowAdd(!showAdd); }}
                className="flex-1 px-3 py-2 rounded-lg bg-orange-500 text-white font-medium text-sm"
              >
                + Add
              </button>
              <label className="flex-1 px-3 py-2 rounded-lg bg-blue-500 text-white font-medium text-sm text-center">
                Import
                <input type="file" accept=".json,application/json" onChange={handleImport} style={{display:"none"}} />
              </label>
            </div>

            {importMessage && (
              <div className="mt-3 p-2 bg-green-50 border border-green-200 rounded-lg text-sm text-green-900">
                {importMessage}
              </div>
            )}

            {showAdd && (
              <div className="mt-3 p-3 bg-orange-50 rounded-lg border border-orange-200 space-y-2">
                <input
                  type="text"
                  placeholder="Name"
                  value={newItem.name}
                  onChange={function(e) { setNewItem(Object.assign({}, newItem, { name: e.target.value })); }}
                  className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"
                />
                <input
                  type="text"
                  placeholder="Unit (e.g. 500g bag)"
                  value={newItem.unit}
                  onChange={function(e) { setNewItem(Object.assign({}, newItem, { unit: e.target.value })); }}
                  className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm"
                />
                <select
                  value={newItem.category}
                  onChange={function(e) { setNewItem(Object.assign({}, newItem, { category: e.target.value })); }}
                  className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white"
                >
                  {CATEGORIES.map(function(c) { return <option key={c}>{c}</option>; })}
                </select>
                <div className="flex gap-2">
                  <input
                    type="number"
                    min="1"
                    value={newItem.qty}
                    onChange={function(e) { setNewItem(Object.assign({}, newItem, { qty: parseInt(e.target.value) || 1 })); }}
                    className="w-20 px-3 py-2 border border-gray-200 rounded-lg text-sm"
                  />
                  <button
                    onClick={addItem}
                    className="flex-1 px-4 py-2 bg-green-500 text-white rounded-lg text-sm font-medium"
                  >
                    Save
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* Empty state */}
          {items.length === 0 && (
            <div className="bg-white rounded-2xl p-8 text-center text-gray-500 border border-dashed border-gray-300">
              <div className="text-4xl mb-2">🥣</div>
              <p className="font-medium text-gray-700 mb-1">Your pantry is empty</p>
              <p className="text-sm">Tap <span className="font-semibold text-orange-600">+ Add</span> or <span className="font-semibold text-blue-600">Import</span> to get started</p>
            </div>
          )}

          {/* Staples section */}
          {staples.length > 0 && (
            <div className="mb-4">
              <h2 className="text-lg font-bold text-gray-800 mb-2 px-1 flex items-center gap-2">
                <span className="text-xl">⭐</span>
                Staples
                <span className="text-sm text-gray-400 font-normal">({staples.length})</span>
              </h2>
              <div className="space-y-2">
                {staples.map(function(item) {
                  const out = item.outOfStock;
                  return (
                    <div
                      key={item.id}
                      className={out
                        ? "bg-amber-50 rounded-xl shadow-sm border-2 border-amber-300 p-3 flex items-center gap-3"
                        : "bg-white rounded-xl shadow-sm border border-gray-200 p-3 flex items-center gap-3"}
                    >
                      <button
                        onClick={function() { toggleStaple(item.id); }}
                        className="flex-shrink-0 w-7 h-7 flex items-center justify-center text-xl"
                        title="Remove from staples"
                      >⭐</button>
                      <div className="flex-1 min-w-0">
                        <div className="font-medium text-gray-900">{item.name}</div>
                        <div className="text-xs text-gray-500">{out ? "Need to buy" : "In stock"}</div>
                      </div>
                      <button
                        onClick={function() { toggleStapleStock(item.id); }}
                        className={out
                          ? "px-3 py-1.5 rounded-lg bg-amber-500 text-white text-sm font-medium"
                          : "px-3 py-1.5 rounded-lg bg-green-100 text-green-900 text-sm font-medium"}
                      >
                        {out ? "Need" : "Have"}
                      </button>
                      <button
                        onClick={function() { removeItem(item.id); }}
                        className="w-7 h-7 flex items-center justify-center text-gray-400"
                      >🗑</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Category sections */}
          {cats.map(function(category) {
            const categoryItems = nonStaples.filter(function(i) { return i.category === category; });
            if (categoryItems.length === 0) return null;
            return (
              <div key={category} className="mb-4">
                <h2 className="text-lg font-bold text-gray-800 mb-2 px-1 flex items-center gap-2">
                  <span className="text-xl">{categoryIcons[category]}</span>
                  {category}
                  <span className="text-sm text-gray-400 font-normal">({categoryItems.length})</span>
                </h2>
                <div className="space-y-2">
                  {categoryItems.map(function(item) {
                    const dimmed = item.used || item.qty === 0;
                    return (
                      <div
                        key={item.id}
                        className={dimmed
                          ? "bg-white rounded-xl shadow-sm border border-gray-200 p-3 flex items-center gap-2 opacity-50"
                          : "bg-white rounded-xl shadow-sm border border-gray-200 p-3 flex items-center gap-2"}
                      >
                        <button
                          onClick={function() { toggleStaple(item.id); }}
                          className="flex-shrink-0 w-7 h-7 flex items-center justify-center text-gray-300 text-xl"
                          title="Mark as staple"
                        >☆</button>
                        <button
                          onClick={function() { toggleUsed(item.id); }}
                          className={item.used
                            ? "flex-shrink-0 w-7 h-7 rounded-full border-2 bg-green-500 border-green-500 text-white flex items-center justify-center"
                            : "flex-shrink-0 w-7 h-7 rounded-full border-2 border-gray-300 flex items-center justify-center"}
                        >
                          {item.used ? "✓" : ""}
                        </button>
                        <div className="flex-1 min-w-0">
                          <div className={item.used ? "font-medium text-gray-900 line-through" : "font-medium text-gray-900"}>
                            {item.name}
                          </div>
                          <div className="text-xs text-gray-500">{item.unit}</div>
                        </div>
                        <div className="flex items-center gap-1 bg-gray-50 rounded-lg p-1">
                          <button
                            onClick={function() { adjustQty(item.id, -1); }}
                            className="w-7 h-7 flex items-center justify-center text-gray-600 font-bold"
                          >−</button>
                          <span className="w-6 text-center font-bold text-gray-900 text-sm">{item.qty}</span>
                          <button
                            onClick={function() { adjustQty(item.id, 1); }}
                            className="w-7 h-7 flex items-center justify-center text-gray-600 font-bold"
                          >+</button>
                        </div>
                        <button
                          onClick={function() { removeItem(item.id); }}
                          className="w-7 h-7 flex items-center justify-center text-gray-400"
                        >🗑</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}

          {items.length > 0 && filtered.length === 0 && (
            <div className="bg-white rounded-2xl p-8 text-center text-gray-500 border border-dashed border-gray-300">
              <p>No ingredients match your filter</p>
            </div>
          )}

          {items.length > 0 && (
            <div className="mt-6 flex justify-center">
              <button onClick={clearAll} className="text-sm text-gray-500 underline">
                Clear entire pantry
              </button>
            </div>
          )}
        </div>
      );
    }

    function ShoppingView(props) {
      const items = props.items;
      const setItems = props.setItems;
      const shoppingList = props.shoppingList;
      const setShoppingList = props.setShoppingList;
      const history = props.history;
      const setHistory = props.setHistory;

      const [input, setInput] = useState("");

      function addToList(name, category, unit) {
        const nameKey = name.toLowerCase().trim();
        if (!nameKey) return;
        const existing = shoppingList.find(function(s) {
          return s.name.toLowerCase().trim() === nameKey;
        });
        if (existing) {
          setShoppingList(shoppingList.map(function(s) {
            return s.id === existing.id ? Object.assign({}, s, { qty: s.qty + 1 }) : s;
          }));
        } else {
          setShoppingList(shoppingList.concat([{
            id: nextId(shoppingList),
            name: name,
            qty: 1,
            fromStaple: false,
            suggestedCategory: category || "",
            suggestedUnit: unit || ""
          }]));
        }
        setHistory(recordHistory(history, name, category, unit));
      }

      function submitInput() {
        if (!input.trim()) return;
        // Look up in history to reuse category/unit
        const key = input.toLowerCase().trim();
        const hit = history.find(function(h) { return h.key === key; });
        addToList(input.trim(), hit ? hit.lastCategory : "", hit ? hit.lastUnit : "");
        setInput("");
      }

      function removeFromList(id) {
        const item = shoppingList.find(function(s) { return s.id === id; });
        if (!item) return;
        // If it came from a staple, also mark the staple back in-stock
        if (item.fromStaple) {
          const nameKey = item.name.toLowerCase().trim();
          setItems(items.map(function(i) {
            if (i.staple && i.name.toLowerCase().trim() === nameKey) {
              return Object.assign({}, i, { outOfStock: false });
            }
            return i;
          }));
        }
        setShoppingList(shoppingList.filter(function(s) { return s.id !== id; }));
      }

      function moveToPantry(id) {
        const item = shoppingList.find(function(s) { return s.id === id; });
        if (!item) return;
        const nameKey = item.name.toLowerCase().trim();

        // If it's a staple, mark back in stock
        const stapleMatch = items.find(function(i) {
          return i.staple && i.name.toLowerCase().trim() === nameKey;
        });
        if (stapleMatch) {
          setItems(items.map(function(i) {
            return i.id === stapleMatch.id ? Object.assign({}, i, { outOfStock: false }) : i;
          }));
          setShoppingList(shoppingList.filter(function(s) { return s.id !== id; }));
          return;
        }

        // If item exists in pantry (not staple), increment qty
        const pantryMatch = items.find(function(i) {
          return !i.staple && i.name.toLowerCase().trim() === nameKey;
        });
        if (pantryMatch) {
          setItems(items.map(function(i) {
            return i.id === pantryMatch.id ? Object.assign({}, i, { qty: i.qty + item.qty }) : i;
          }));
          setShoppingList(shoppingList.filter(function(s) { return s.id !== id; }));
          return;
        }

        // New item - use suggested category from history
        const category = item.suggestedCategory || "Fresh / Other";
        const unit = item.suggestedUnit || "";
        setItems(items.concat([{
          id: nextId(items),
          name: item.name,
          qty: item.qty,
          unit: unit,
          category: category,
          used: false,
          staple: false,
          outOfStock: false
        }]));
        setShoppingList(shoppingList.filter(function(s) { return s.id !== id; }));
      }

      function adjustListQty(id, delta) {
        setShoppingList(shoppingList.map(function(s) {
          return s.id === id ? Object.assign({}, s, { qty: Math.max(1, s.qty + delta) }) : s;
        }));
      }

      function clearList() {
        if (shoppingList.length === 0) return;
        if (confirm("Clear the entire shopping list?")) {
          // Also reset any staples that were out of stock
          const stapleNames = shoppingList
            .filter(function(s) { return s.fromStaple; })
            .map(function(s) { return s.name.toLowerCase().trim(); });
          if (stapleNames.length > 0) {
            setItems(items.map(function(i) {
              if (i.staple && stapleNames.indexOf(i.name.toLowerCase().trim()) !== -1) {
                return Object.assign({}, i, { outOfStock: false });
              }
              return i;
            }));
          }
          setShoppingList([]);
        }
      }

      // Quick-add grid: most frequent items from history, excluding items already on shopping list
      const listNames = shoppingList.map(function(s) { return s.name.toLowerCase().trim(); });
      const gridCandidates = history
        .filter(function(h) { return listNames.indexOf(h.key) === -1; })
        .slice()
        .sort(function(a, b) { return b.addCount - a.addCount; });

      // Filter by search input
      const gridFiltered = input.trim()
        ? gridCandidates.filter(function(h) {
            return h.name.toLowerCase().indexOf(input.toLowerCase()) !== -1;
          })
        : gridCandidates;

      const gridDisplay = gridFiltered.slice(0, 18);

      // Autocomplete suggestions (for text dropdown)
      const suggestions = input.trim()
        ? history
            .filter(function(h) { return h.name.toLowerCase().indexOf(input.toLowerCase()) !== -1; })
            .slice(0, 5)
        : [];

      return (
        <div>
          <div className="bg-white rounded-2xl shadow-sm p-4 mb-4 border border-orange-100">
            <div className="flex gap-3 text-sm mb-3">
              <div className="bg-orange-100 px-3 py-1.5 rounded-lg text-orange-900 font-medium">
                {shoppingList.length} on list
              </div>
            </div>

            <div className="flex gap-2">
              <input
                type="text"
                placeholder="Add item..."
                value={input}
                onChange={function(e) { setInput(e.target.value); }}
                onKeyDown={function(e) { if (e.key === "Enter") submitInput(); }}
                className="flex-1 px-3 py-2 border border-gray-200 rounded-lg"
              />
              <button
                onClick={submitInput}
                className="px-4 py-2 rounded-lg bg-orange-500 text-white font-medium text-sm"
              >
                Add
              </button>
            </div>

            {/* Autocomplete dropdown */}
            {suggestions.length > 0 && (
              <div className="mt-2 border border-gray-200 rounded-lg overflow-hidden bg-white">
                {suggestions.map(function(s) {
                  return (
                    <button
                      key={s.key}
                      onClick={function() {
                        addToList(s.name, s.lastCategory, s.lastUnit);
                        setInput("");
                      }}
                      className="w-full text-left px-3 py-2 hover:bg-orange-50 border-b border-gray-100 last:border-b-0 text-sm flex items-center justify-between"
                    >
                      <span>{s.name}</span>
                      <span className="text-xs text-gray-400">×{s.addCount}</span>
                    </button>
                  );
                })}
              </div>
            )}
          </div>

          {/* Quick-add grid */}
          {gridDisplay.length > 0 && (
            <div className="mb-4">
              <h2 className="text-lg font-bold text-gray-800 mb-2 px-1 flex items-center gap-2">
                <span className="text-xl">✨</span>
                Quick add
                <span className="text-sm text-gray-400 font-normal">
                  {input.trim() ? "(" + gridFiltered.length + " matches)" : "(your usual)"}
                </span>
              </h2>
              <div className="grid grid-cols-3 gap-2">
                {gridDisplay.map(function(h) {
                  const catColor = categoryColors[h.lastCategory] || "bg-gray-100 text-gray-800";
                  return (
                    <button
                      key={h.key}
                      onClick={function() { addToList(h.name, h.lastCategory, h.lastUnit); }}
                      className={catColor + " rounded-xl p-3 text-sm font-medium shadow-sm border border-white/50 active:scale-95 transition-transform"}
                    >
                      {h.name}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Shopping list */}
          {shoppingList.length === 0 ? (
            <div className="bg-white rounded-2xl p-8 text-center text-gray-500 border border-dashed border-gray-300">
              <div className="text-4xl mb-2">🛒</div>
              <p className="font-medium text-gray-700 mb-1">Shopping list is empty</p>
              <p className="text-sm">
                {history.length === 0
                  ? "Add items manually above, or mark pantry items as staples (⭐) and run out to auto-populate"
                  : "Tap a tile above or type to add"}
              </p>
            </div>
          ) : (
            <div className="mb-4">
              <h2 className="text-lg font-bold text-gray-800 mb-2 px-1 flex items-center gap-2">
                <span className="text-xl">🛒</span>
                To buy
                <span className="text-sm text-gray-400 font-normal">({shoppingList.length})</span>
              </h2>
              <div className="space-y-2">
                {shoppingList.map(function(s) {
                  return (
                    <div
                      key={s.id}
                      className="bg-white rounded-xl shadow-sm border border-gray-200 p-3 flex items-center gap-2"
                    >
                      {s.fromStaple && (
                        <span className="text-amber-500 text-lg" title="From staples">⭐</span>
                      )}
                      <div className="flex-1 min-w-0">
                        <div className="font-medium text-gray-900">{s.name}</div>
                      </div>
                      <div className="flex items-center gap-1 bg-gray-50 rounded-lg p-1">
                        <button
                          onClick={function() { adjustListQty(s.id, -1); }}
                          className="w-7 h-7 flex items-center justify-center text-gray-600 font-bold"
                        >−</button>
                        <span className="w-6 text-center font-bold text-gray-900 text-sm">{s.qty}</span>
                        <button
                          onClick={function() { adjustListQty(s.id, 1); }}
                          className="w-7 h-7 flex items-center justify-center text-gray-600 font-bold"
                        >+</button>
                      </div>
                      <button
                        onClick={function() { moveToPantry(s.id); }}
                        className="w-8 h-8 rounded-md bg-green-100 text-green-700 flex items-center justify-center font-bold"
                        title="Bought - add to pantry"
                      >✓</button>
                      <button
                        onClick={function() { removeFromList(s.id); }}
                        className="w-8 h-8 rounded-md flex items-center justify-center text-gray-400"
                        title="Remove from list"
                      >🗑</button>
                    </div>
                  );
                })}
              </div>

              <div className="mt-6 flex justify-center">
                <button onClick={clearList} className="text-sm text-gray-500 underline">
                  Clear shopping list
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("sw.js").catch(function(err) { console.error(err); });
      });
    }
  </script>
</body>
</html>
